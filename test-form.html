<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Apply Now - HireFound</title>
  <meta name="description" content="Apply for open roles at HireFound by Yasmin Blasi.">
  <link rel="icon" href="assets/hirefound-favicon.svg" type="image/svg+xml">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            warm: '#FFFAF5',
            'warm-dark': '#F8F0EA',
            primary: '#8B2252',
            'primary-light': '#A63B6B',
            'primary-dark': '#6D1A3F',
            secondary: '#D4A574',
            'secondary-light': '#E0BA92',
            dark: '#1A1A2E',
            'dark-light': '#252540',
            'text-main': '#2D2926',
            muted: '#8A8380',
            success: '#7A9E7E',
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
            accent: ['"DM Serif Display"', 'Georgia', 'serif'],
          },
          boxShadow: {
            card: '0 4px 24px rgba(45, 41, 38, 0.06)',
            warm: '0 4px 20px rgba(139, 34, 82, 0.12)',
          },
        }
      }
    }
  </script>

  <style>
    .text-gradient {
      background: linear-gradient(135deg, #8B2252 0%, #D4A574 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
  </style>
</head>

<body class="bg-warm text-text-main font-sans antialiased">

  <!-- Nav -->
  <nav class="bg-white/80 backdrop-blur-md border-b border-primary/[0.08] sticky top-0 z-50">
    <div class="max-w-5xl mx-auto px-6 py-4 flex items-center justify-between">
      <a href="index.html" class="font-accent text-xl font-bold text-primary">HireFound</a>
      <a href="index.html" class="text-sm text-muted hover:text-primary transition-colors duration-200">← Back to Home</a>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="max-w-3xl mx-auto px-6 py-16">

    <!-- Header -->
    <div class="text-center mb-12">
      <h1 class="font-accent text-3xl md:text-4xl lg:text-5xl font-bold text-primary mb-4">Apply Now</h1>
      <p class="text-muted text-lg max-w-xl mx-auto">Interested in one of our open roles? Fill out the form below and Yasmin will be in touch.</p>
    </div>

    <!-- Tally Form Embed -->
    <div class="bg-white rounded-2xl shadow-card p-4 md:p-8">
      <iframe
        data-tally-src="https://tally.so/embed/WOj6aQ?alignLeft=1&hideTitle=1&transparentBackground=1&dynamicHeight=1"
        loading="lazy"
        width="100%"
        height="300"
        frameborder="0"
        marginheight="0"
        marginwidth="0"
        title="Job Application Form"
      ></iframe>
    </div>

  </main>

  <!-- Footer -->
  <footer class="border-t border-primary/[0.06] mt-16">
    <div class="max-w-5xl mx-auto px-6 py-8 text-center">
      <p class="text-sm text-muted">© 2025 HireFound by Yasmin Blasi. All rights reserved.</p>
    </div>
  </footer>

  <!-- Tally Widget Script -->
  <script src="https://tally.so/widgets/embed.js"></script>

</body>
</html>
