<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Find Your Match - Open Roles | HireFound</title>
  <meta name="description" content="Browse open roles at HireFound. We match talented professionals with meaningful careers across hospitality, tech, F&B, aviation, and more.">
  <meta property="og:title" content="Find Your Match - Open Roles | HireFound">
  <meta property="og:description" content="Browse open roles and find your next career match with HireFound.">
  <meta property="og:type" content="website">
  <link rel="icon" href="../assets/hirefound-favicon.svg" type="image/svg+xml">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="../js/tailwind-config.js"></script>

  <!-- Shared Styles -->
  <link rel="stylesheet" href="../css/shared.css">

  <style>
    /* === Skeleton Loader === */
    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }
    .skeleton {
      background: linear-gradient(90deg, #f0ebe6 25%, #e8e0d8 50%, #f0ebe6 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s ease-in-out infinite;
      border-radius: 8px;
    }
  </style>
</head>

<body class="bg-warm text-text-main font-sans antialiased overflow-x-hidden">

  <!-- Skip to Content -->
  <a href="#main-content" class="skip-link">Skip to content</a>

  <!-- ==================== STICKY NAV ==================== -->
  <nav id="navbar" class="fixed top-0 left-0 right-0 z-50 nav-glass" aria-label="Main navigation">
    <noscript>
      <div class="max-w-6xl mx-auto px-6 py-3">
        <a href="/" class="font-accent text-xl font-bold text-primary">HireFound</a>
      </div>
    </noscript>
  </nav>

  <!-- ==================== MAIN CONTENT ==================== -->
  <main id="main-content" class="pt-20">

    <!-- Page Header -->
    <section class="py-16 lg:py-20 px-6 bg-gradient-to-b from-warm to-warm-dark/40 relative overflow-hidden">
      <div class="absolute inset-0 pointer-events-none">
        <div class="w-40 h-40 rounded-full bg-secondary/[0.04] absolute top-10 right-20 blur-3xl"></div>
        <div class="w-32 h-32 rounded-full bg-primary/[0.03] absolute bottom-10 left-1/4 blur-3xl"></div>
      </div>
      <div class="max-w-5xl mx-auto relative z-10 text-center reveal">
        <h1 class="font-accent text-4xl md:text-5xl lg:text-6xl font-bold text-primary mb-4">Find Your Match</h1>
        <p class="text-muted text-lg max-w-xl mx-auto">Browse open roles I'm currently hiring for. Your next career move might be one click away.</p>
      </div>
    </section>

    <!-- Jobs Listing Section -->
    <section class="py-12 lg:py-16 px-6 bg-warm" aria-label="Job listings">
      <div class="max-w-5xl mx-auto">

        <!-- Filter Pills Container -->
        <div id="filter-pills" class="flex flex-wrap justify-center gap-2 mb-10" role="group" aria-label="Filter jobs by category">
          <!-- Filter pills will be dynamically generated -->
        </div>

        <!-- Job Cards Grid Container -->
        <div id="job-cards-grid" class="grid md:grid-cols-2 gap-6" aria-label="Job listings grid" aria-live="polite">
          <!-- Job cards will be dynamically rendered -->
        </div>

      </div>
    </section>

    <!-- Detail View Container -->
    <section id="job-detail-container" class="hidden py-12 lg:py-16 px-6 bg-warm" aria-label="Job details">
      <div class="max-w-3xl mx-auto px-4">
        <div id="job-detail-content">
          <!-- Job detail will be dynamically rendered -->
        </div>
      </div>
    </section>

  </main>

  <!-- Wave: Warm to Dark -->
  <div class="bg-warm -mb-px">
    <svg class="block w-full h-16 md:h-20" viewBox="0 0 1440 80" preserveAspectRatio="none">
      <path d="M0,50 C360,10 720,70 1080,25 C1260,10 1380,35 1440,20 L1440,80 L0,80 Z" fill="#1A1A2E"/>
    </svg>
  </div>

  <!-- ==================== FOOTER ==================== -->
  <div id="footer">
    <noscript>
      <div class="mt-24 pt-10 border-t border-white/8 text-center">
        <p class="text-white/30 text-sm">HireFound &copy; 2026</p>
      </div>
    </noscript>
  </div>

  <!-- ==================== SCRIPTS ==================== -->
  <script type="module">
    import { initNav } from '../js/nav.js';
    import { initFooter } from '../js/footer.js';
    initNav(document.getElementById('navbar'));
    initFooter(document.getElementById('footer'));
  </script>

  <script type="module">
    import { fetchJobs, renderJobCards, renderSkeletons, renderError, renderEmpty, renderJobDetail, renderNotFound, getCategories, filterByCategory } from '../js/jobs.js';

    // ─── DOM References ──────────────────────────────────────────────────────────
    const filterPillsContainer = document.getElementById('filter-pills');
    const jobCardsGrid = document.getElementById('job-cards-grid');
    const jobDetailContainer = document.getElementById('job-detail-container');
    const jobDetailContent = document.getElementById('job-detail-content');
    const listingSection = document.querySelector('[aria-label="Job listings"]');

    // ─── State ───────────────────────────────────────────────────────────────────
    let allJobs = [];
    let activeCategory = 'all';

    // ─── URL Routing ─────────────────────────────────────────────────────────────
    function getViewState() {
      const params = new URLSearchParams(window.location.search);
      const id = params.get('id');
      return id ? 'DETAIL' : 'LISTING';
    }

    function getSlugFromURL() {
      const params = new URLSearchParams(window.location.search);
      return params.get('id');
    }

    // ─── View Switching ──────────────────────────────────────────────────────────
    function showListingView() {
      listingSection.classList.remove('hidden');
      jobDetailContainer.classList.add('hidden');
    }

    function showDetailView() {
      listingSection.classList.add('hidden');
      jobDetailContainer.classList.remove('hidden');
    }

    // ─── Filter Pills ────────────────────────────────────────────────────────────
    function renderFilterPills(categories) {
      filterPillsContainer.innerHTML = '';

      // "All" pill always first
      const allPill = document.createElement('button');
      allPill.className = 'filter-pill active';
      allPill.textContent = 'All';
      allPill.setAttribute('aria-label', 'Show all jobs');
      allPill.setAttribute('aria-pressed', 'true');
      allPill.addEventListener('click', () => handleFilterClick('all'));
      filterPillsContainer.appendChild(allPill);

      // Category pills
      categories.forEach(category => {
        const pill = document.createElement('button');
        pill.className = 'filter-pill';
        pill.textContent = category.charAt(0).toUpperCase() + category.slice(1);
        pill.setAttribute('aria-label', `Filter by ${category}`);
        pill.setAttribute('aria-pressed', 'false');
        pill.addEventListener('click', () => handleFilterClick(category));
        filterPillsContainer.appendChild(pill);
      });
    }

    function updatePillStyles(selectedCategory) {
      const pills = filterPillsContainer.querySelectorAll('.filter-pill');
      pills.forEach(pill => {
        const pillCategory = pill.textContent.toLowerCase();
        const isActive = pillCategory === selectedCategory.toLowerCase() ||
          (selectedCategory === 'all' && pill.textContent === 'All');

        if (isActive) {
          pill.classList.add('active');
          pill.setAttribute('aria-pressed', 'true');
        } else {
          pill.classList.remove('active');
          pill.setAttribute('aria-pressed', 'false');
        }
      });
    }

    function handleFilterClick(category) {
      activeCategory = category;
      updatePillStyles(category);

      const filtered = filterByCategory(allJobs, category);

      if (filtered.length === 0) {
        const message = category === 'all'
          ? 'No open roles available right now.'
          : `No jobs available in ${category.charAt(0).toUpperCase() + category.slice(1)}.`;
        renderEmpty(jobCardsGrid, message);
      } else {
        renderJobCards(filtered, jobCardsGrid);
        // Re-trigger scroll reveal for newly rendered cards
        initRevealObserver();
      }
    }

    // ─── Listing View Controller ─────────────────────────────────────────────────
    async function loadListingView() {
      showListingView();
      // Show skeleton loaders while fetching
      renderSkeletons(4, jobCardsGrid);
      filterPillsContainer.innerHTML = '';

      try {
        allJobs = await fetchJobs();

        if (allJobs.length === 0) {
          renderEmpty(jobCardsGrid, 'No open roles available right now.');
          return;
        }

        // Render job cards
        renderJobCards(allJobs, jobCardsGrid);

        // Generate and render filter pills from distinct categories
        const categories = getCategories(allJobs);
        renderFilterPills(categories);

        // Trigger scroll reveal for cards
        initRevealObserver();

      } catch (error) {
        console.error('Failed to load jobs:', error);
        renderError(jobCardsGrid, loadListingView);
        filterPillsContainer.innerHTML = '';
      }
    }

    // ─── Detail View Controller ──────────────────────────────────────────────────
    async function loadDetailView(slug) {
      showDetailView();

      // Show loading spinner while fetching
      jobDetailContent.innerHTML = '<div class="flex justify-center py-16"><div class="w-8 h-8 border-4 border-primary/30 border-t-primary rounded-full animate-spin"></div></div>';

      try {
        const jobs = await fetchJobs();
        const job = jobs.find(j => j.slug === slug);

        if (!job) {
          // Job not found — slug doesn't match any active, non-expired job
          renderNotFound(jobDetailContent);
          wireBackLinks();
          return;
        }

        // Render the job detail view
        renderJobDetail(job, jobDetailContent);
        wireBackLinks();

      } catch (error) {
        console.error('Failed to load job detail:', error);
        renderError(jobDetailContent, () => loadDetailView(slug));
      }
    }

    // ─── Back Link Wiring ────────────────────────────────────────────────────────
    function wireBackLinks() {
      // Wire all back links in the detail content to use pushState
      const backLinks = jobDetailContent.querySelectorAll('a[data-back-link], a[href="/jobs/"]');
      backLinks.forEach(link => {
        link.addEventListener('click', (e) => {
          e.preventDefault();
          try {
            history.pushState({}, '', '/jobs/');
            loadListingView();
          } catch (err) {
            // pushState unavailable — prevent navigation and keep current view
          }
        });
      });
    }

    // ─── Card Navigation Event ───────────────────────────────────────────────────
    // Listen for custom jobNavigate events dispatched by card clicks in jobs.js
    window.addEventListener('jobNavigate', (e) => {
      const slug = e.detail && e.detail.slug;
      if (slug) {
        loadDetailView(slug);
      }
    });

    // ─── Scroll Reveal ───────────────────────────────────────────────────────────
    function initRevealObserver() {
      const revealElements = document.querySelectorAll('.reveal:not(.revealed)');
      const revealObserver = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.classList.add('revealed');
            revealObserver.unobserve(entry.target);
          }
        });
      }, { threshold: 0.1 });

      revealElements.forEach(el => revealObserver.observe(el));
    }

    // ─── Routing ─────────────────────────────────────────────────────────────────
    function route() {
      const viewState = getViewState();

      if (viewState === 'LISTING') {
        loadListingView();
      } else {
        const slug = getSlugFromURL();
        loadDetailView(slug);
      }
    }

    // Handle browser back/forward navigation
    window.addEventListener('popstate', () => {
      route();
    });

    // ─── Initialize ──────────────────────────────────────────────────────────────
    route();

    // Initialize scroll reveal for static elements (header, etc.)
    initRevealObserver();
  </script>
</body>
</html>
