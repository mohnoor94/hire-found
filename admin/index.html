<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yasmin's Space</title>
  <link rel="icon" href="../assets/butterfly-favicon.svg" type="image/svg+xml">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="../js/tailwind-config.js"></script>

  <!-- Quill WYSIWYG Editor -->
  <link href="https://cdn.jsdelivr.net/npm/quill@2.0.3/dist/quill.snow.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/quill@2.0.3/dist/quill.js"></script>

  <!-- Shared Styles -->
  <link rel="stylesheet" href="../css/shared.css">

  <style>
    /* ============================================
       Admin Panel — Micro-interactions & Polish
       ============================================ */

    /* === Quill Editor Overrides === */
    .ql-container {
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 0.875rem;
      border-bottom-left-radius: 0.75rem;
      border-bottom-right-radius: 0.75rem;
      border-color: #e5e7eb;
      min-height: 180px;
    }
    .ql-toolbar {
      border-top-left-radius: 0.75rem;
      border-top-right-radius: 0.75rem;
      border-color: #e5e7eb;
      background: #fafafa;
      padding: 4px 8px !important;
    }
    .ql-toolbar .ql-formats {
      margin-right: 8px !important;
    }
    .ql-toolbar button {
      width: 24px !important;
      height: 24px !important;
      padding: 2px !important;
    }
    .ql-toolbar button svg {
      width: 14px !important;
      height: 14px !important;
    }
    .ql-toolbar .ql-picker {
      height: 24px !important;
      font-size: 11px !important;
    }
    .ql-toolbar .ql-picker-label {
      padding: 0 4px !important;
      border: none !important;
      line-height: 24px !important;
    }
    .ql-toolbar .ql-picker-label svg {
      width: 12px !important;
      height: 12px !important;
    }
    .ql-toolbar .ql-picker-options {
      font-size: 12px !important;
      padding: 4px 0 !important;
    }
    .ql-toolbar .ql-picker-options .ql-picker-item {
      padding: 4px 8px !important;
    }
    .ql-editor {
      min-height: 180px;
      padding: 12px 16px;
      line-height: 1.6;
    }
    .ql-editor h2 {
      font-size: 1.25rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }
    .ql-editor h3 {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 0.4rem;
    }
    .ql-editor a {
      color: #2563eb;
      text-decoration: underline;
      text-underline-offset: 3px;
      font-weight: 500;
    }
    .ql-editor a:hover {
      color: #1d4ed8;
    }
    .ql-editor ul, .ql-editor ol {
      padding-left: 1.5rem;
      margin-bottom: 0.5rem;
    }
    .ql-editor.ql-blank::before {
      font-style: normal;
      color: #8A8380;
      font-size: 0.875rem;
      left: 16px;
    }
    .quill-rtl .ql-editor {
      direction: rtl;
      text-align: right;
    }
    .quill-rtl .ql-editor.ql-blank::before {
      left: auto;
      right: 16px;
    }
    .quill-rtl .ql-editor ul, .quill-rtl .ql-editor ol {
      padding-left: 0;
      padding-right: 1.5rem;
    }

    /* === Loading Butterfly === */
    .admin-loading-spinner {
      width: 48px;
      height: 48px;
      animation: butterflyPulse 1.5s ease-in-out infinite;
    }

    @keyframes butterflyPulse {
      0%, 100% { transform: scale(1); opacity: 0.7; }
      50% { transform: scale(1.1); opacity: 1; }
    }

    /* === View Transitions (Dashboard ↔ Editor) === */
    #view-dashboard,
    #view-editor {
      transition: opacity 400ms var(--ease-out-quint), transform 400ms var(--ease-out-quint);
    }

    #view-dashboard.view-exit {
      opacity: 0;
      transform: translateX(-20px);
    }

    #view-editor.view-enter {
      opacity: 0;
      transform: translateX(20px);
    }

    #view-editor.view-enter-active {
      opacity: 1;
      transform: translateX(0);
    }

    /* === Card Hover Effects === */
    .job-card {
      box-shadow: 0 4px 24px rgba(253, 164, 175, 0.15);
      transition: transform 400ms var(--ease-out-quint),
                  box-shadow 400ms var(--ease-out-quint),
                  border-color 300ms var(--ease-out-expo);
    }

    .job-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 40px rgba(253, 164, 175, 0.25);
    }

    .job-card:active {
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(253, 164, 175, 0.20);
    }

    /* === Form Reveal Animation === */
    .form-section,
    .section-content {
      transition: opacity 500ms var(--ease-out-expo),
                  transform 500ms var(--ease-out-expo);
    }

    .form-section[data-collapsed="true"] {
      opacity: 0;
      max-height: 0;
      overflow: hidden;
      transform: translateY(-8px);
    }

    .form-section[data-collapsed="false"] {
      opacity: 1;
      max-height: 2000px;
      transform: translateY(0);
    }

    /* === Status Toggle Transition === */
    .status-toggle {
      transition: background-color 300ms var(--ease-out-quint);
    }

    .status-toggle .toggle-knob {
      transition: transform 300ms var(--ease-out-quint);
    }

    /* === Button & Interactive Element Transitions === */
    .admin-btn {
      transition: background-color 300ms var(--ease-out-quint),
                  color 300ms var(--ease-out-quint),
                  transform 300ms var(--ease-out-quint),
                  box-shadow 300ms var(--ease-out-quint);
    }

    .admin-btn:hover {
      transform: translateY(-1px);
    }

    .admin-btn:active {
      transform: translateY(0);
    }

    /* === Card Exit Animation (Delete) === */
    .job-card.card-exit {
      transition: opacity 300ms var(--ease-out-expo),
                  transform 300ms var(--ease-out-expo);
      opacity: 0;
      transform: scale(0.95) translateY(-8px);
    }

    /* === Loading Indicator (appears within 200ms) === */
    .loading-indicator {
      opacity: 0;
      animation: fadeInLoading 0.01ms 200ms forwards;
    }

    @keyframes fadeInLoading {
      to { opacity: 1; }
    }

    .loading-pulse {
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    /* === Skeleton Loading Cards === */
    .skeleton-card {
      animation: skeletonShimmer 1.5s ease-in-out infinite;
      background: linear-gradient(90deg, #f0ebe6 25%, #faf5f0 50%, #f0ebe6 75%);
      background-size: 200% 100%;
    }

    @keyframes skeletonShimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* === Modal Overlay Transition === */
    .modal-overlay {
      transition: opacity 300ms var(--ease-out-quint);
      opacity: 0;
    }

    .modal-overlay.modal-visible {
      opacity: 1;
    }

    .modal-content {
      transition: transform 400ms var(--ease-out-quint), opacity 400ms var(--ease-out-quint);
      transform: scale(0.95) translateY(8px);
      opacity: 0;
    }

    .modal-overlay.modal-visible .modal-content {
      transform: scale(1) translateY(0);
      opacity: 1;
    }

    /* === Responsive Layout === */
    /* Single-column below 768px, multi-column at 768px+ */
    .admin-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1rem;
    }

    @media (min-width: 768px) {
      .admin-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (min-width: 1024px) {
      .admin-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    /* === Touch Targets (minimum 44x44px) === */
    .touch-target {
      min-width: 44px;
      min-height: 44px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    /* Ensure all interactive elements meet touch target size */
    #view-app button,
    #view-app a,
    #view-app input,
    #view-app select,
    #view-app textarea,
    #view-app [role="button"],
    #view-app [role="switch"] {
      min-height: 44px;
    }

    #view-app button,
    #view-app a,
    #view-app [role="button"],
    #view-app [role="switch"] {
      min-width: 44px;
    }

    /* === Prefers Reduced Motion === */
    @media (prefers-reduced-motion: reduce) {
      /* Disable motion-based transitions */
      .admin-loading-spinner {
        animation: none !important;
        opacity: 1;
      }

      #view-dashboard,
      #view-editor,
      .job-card,
      .form-section,
      .section-content,
      .status-toggle,
      .status-toggle .toggle-knob,
      .admin-btn,
      .modal-overlay,
      .modal-content {
        transition-duration: 0.01s !important;
      }

      .job-card.card-exit {
        transition-duration: 0.01s !important;
      }

      /* Disable transform-based animations */
      .job-card:hover {
        transform: none;
      }

      .admin-btn:hover,
      .admin-btn:active {
        transform: none;
      }

      #view-dashboard.view-exit {
        transform: none;
      }

      #view-editor.view-enter {
        transform: none;
      }

      .modal-content {
        transform: none;
      }

      /* Disable shimmer animation on skeletons */
      .skeleton-card {
        animation: none !important;
        background: #f0ebe6;
      }

      /* Keep loading indicator delay but remove fade animation */
      .loading-indicator {
        animation: none;
        opacity: 1;
      }

      /* Preserve non-movement feedback: color changes, opacity, backdrop blur */
      .loading-pulse {
        animation: pulse 1.5s ease-in-out infinite !important;
      }
    }
  </style>
</head>

<body class="text-text-main font-sans antialiased overflow-x-hidden min-h-screen" style="background: linear-gradient(to bottom, #FFFAF5, #FFF5F7);">

  <!-- ==================== NAV BAR ==================== -->
  <nav id="admin-nav" class="fixed top-0 left-0 right-0 z-50 nav-glass hidden" aria-label="Admin navigation">
    <div class="max-w-6xl mx-auto px-6 py-3 flex items-center justify-between">
      <a href="./" class="font-accent text-xl font-bold text-primary">Yasmin's Space</a>
      <div class="flex items-center gap-3">
        <a href="../" class="inline-flex items-center justify-center min-w-[44px] min-h-[44px] px-3 py-2 text-xs font-medium text-muted hover:text-primary transition-colors duration-200" aria-label="Go to main site">
          Main Site
        </a>
        <a href="../jobs/" class="inline-flex items-center justify-center min-w-[44px] min-h-[44px] px-3 py-2 text-xs font-medium text-muted hover:text-primary transition-colors duration-200" aria-label="Go to jobs page">
          Jobs Page
        </a>
        <button
          id="sign-out-btn"
          type="button"
          class="inline-flex items-center justify-center min-w-[44px] min-h-[44px] px-4 py-2 text-sm font-semibold text-primary bg-primary/10 rounded-full hover:bg-primary hover:text-white transition-all duration-300"
          aria-label="Sign out"
        >
          Sign Out
        </button>
      </div>
    </div>
  </nav>

  <!-- ==================== LOADING VIEW ==================== -->
  <div id="view-loading" class="flex items-center justify-center min-h-screen">
    <div class="text-center">
      <div class="admin-loading-spinner mx-auto mb-4">
        <svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M24 24C20 20 14 14 10 16C6 18 8 26 12 28C16 30 20 28 24 24Z" fill="#C4B5FD" stroke="#C4B5FD" stroke-width="0.5"/>
          <path d="M24 24C22 28 18 34 14 36C10 38 8 34 10 30C12 26 18 26 24 24Z" fill="#FDA4AF" stroke="#FDA4AF" stroke-width="0.5"/>
          <path d="M24 24C28 20 34 14 38 16C42 18 40 26 36 28C32 30 28 28 24 24Z" fill="#C4B5FD" stroke="#C4B5FD" stroke-width="0.5"/>
          <path d="M24 24C26 28 30 34 34 36C38 38 40 34 38 30C36 26 30 26 24 24Z" fill="#FDA4AF" stroke="#FDA4AF" stroke-width="0.5"/>
          <ellipse cx="24" cy="24" rx="1.5" ry="6" fill="#7C3AED"/>
          <path d="M23 18C22 15 20 13 19 12" stroke="#7C3AED" stroke-width="1" stroke-linecap="round" fill="none"/>
          <path d="M25 18C26 15 28 13 29 12" stroke="#7C3AED" stroke-width="1" stroke-linecap="round" fill="none"/>
          <circle cx="19" cy="12" r="1" fill="#C4B5FD"/>
          <circle cx="29" cy="12" r="1" fill="#C4B5FD"/>
        </svg>
      </div>
      <p class="text-muted text-sm">Loading...</p>
    </div>
  </div>

  <!-- ==================== SIGN-IN VIEW ==================== -->
  <div id="view-sign-in" class="flex items-center justify-center min-h-screen hidden">
    <div class="w-full max-w-sm mx-auto px-6 text-center">
      <svg class="w-16 h-16 mx-auto mb-6" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" style="min-width: 48px; min-height: 48px;">
        <!-- Left wing -->
        <path d="M24 24C20 20 14 14 10 16C6 18 8 26 12 28C16 30 20 28 24 24Z" fill="#C4B5FD" stroke="#C4B5FD" stroke-width="0.5"/>
        <path d="M24 24C22 28 18 34 14 36C10 38 8 34 10 30C12 26 18 26 24 24Z" fill="#FDA4AF" stroke="#FDA4AF" stroke-width="0.5"/>
        <!-- Right wing -->
        <path d="M24 24C28 20 34 14 38 16C42 18 40 26 36 28C32 30 28 28 24 24Z" fill="#C4B5FD" stroke="#C4B5FD" stroke-width="0.5"/>
        <path d="M24 24C26 28 30 34 34 36C38 38 40 34 38 30C36 26 30 26 24 24Z" fill="#FDA4AF" stroke="#FDA4AF" stroke-width="0.5"/>
        <!-- Body -->
        <ellipse cx="24" cy="24" rx="1.5" ry="6" fill="#7C3AED"/>
        <!-- Antennae -->
        <path d="M23 18C22 15 20 13 19 12" stroke="#7C3AED" stroke-width="1" stroke-linecap="round" fill="none"/>
        <path d="M25 18C26 15 28 13 29 12" stroke="#7C3AED" stroke-width="1" stroke-linecap="round" fill="none"/>
        <circle cx="19" cy="12" r="1" fill="#C4B5FD"/>
        <circle cx="29" cy="12" r="1" fill="#C4B5FD"/>
      </svg>
      <h1 class="font-accent text-3xl font-bold text-primary mb-2">Yasmin's Space</h1>
      <p class="text-muted text-sm mb-8">Welcome back, beautiful ✨</p>
      <button
        id="google-sign-in-btn"
        type="button"
        class="inline-flex items-center justify-center min-w-[44px] min-h-[44px] w-full px-6 py-3 text-sm font-semibold text-white bg-butterfly-lavender rounded-full hover:bg-butterfly-rose transition-all duration-300 shadow-lg shadow-butterfly-lavender/30"
      >
        Sign in with Google
      </button>
    </div>
  </div>

  <!-- ==================== APP VIEW (Dashboard + Editor) ==================== -->
  <div id="view-app" class="hidden pt-16">
    <!-- Dashboard View -->
    <div id="view-dashboard" class="max-w-6xl mx-auto px-6 py-8">
      <!-- Dashboard content rendered by JS -->
    </div>

    <!-- Editor View -->
    <div id="view-editor" class="max-w-4xl mx-auto px-6 py-8 hidden">
      <!-- Editor content rendered by JS -->
    </div>
  </div>

  <!-- ==================== TOAST CONTAINER ==================== -->
  <div id="toast-container" class="fixed bottom-6 right-6 z-[100] flex flex-col gap-3 pointer-events-none" aria-live="assertive" aria-atomic="true"></div>

  <!-- Admin App Entry Point -->
  <script type="module" src="js/app.js"></script>
</body>
</html>
