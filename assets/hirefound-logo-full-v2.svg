<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 150" role="img" aria-labelledby="hf2-title">
  <title id="hf2-title">HireFound Logo - Concept 2</title>
  <defs>
    <linearGradient id="v2-rg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9B2C5E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C8956C;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="v2-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C8956C;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#D4A87A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C8956C;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Concept 2: Handshake/Connection within a location pin -->
  <g transform="translate(12, 8)">
    <!-- Location pin body - soft rounded -->
    <path d="M 62 10 C 30 10, 6 34, 6 62 C 6 82, 20 102, 62 130 C 104 102, 118 82, 118 62 C 118 34, 94 10, 62 10 Z"
          fill="url(#v2-rg)" opacity="0.95"/>

    <!-- Inner white space -->
    <path d="M 62 20 C 38 20, 18 38, 18 58 C 18 74, 28 90, 62 114 C 96 90, 106 74, 106 58 C 106 38, 86 20, 62 20 Z"
          fill="#FFFAF5"/>

    <!-- Two flowing paths meeting - representing connection -->
    <!-- Left path (candidate) -->
    <path d="M 32 50 C 38 40, 48 38, 54 46 C 58 52, 60 56, 62 60"
          fill="none" stroke="#9B2C5E" stroke-width="4" stroke-linecap="round"/>
    <!-- Left dot (person) -->
    <circle cx="32" cy="50" r="5.5" fill="#9B2C5E"/>

    <!-- Right path (company) -->
    <path d="M 92 50 C 86 40, 76 38, 70 46 C 66 52, 64 56, 62 60"
          fill="none" stroke="#C8956C" stroke-width="4" stroke-linecap="round"/>
    <!-- Right dot (company) -->
    <circle cx="92" cy="50" r="5.5" fill="#C8956C"/>

    <!-- Meeting point spark -->
    <circle cx="62" cy="60" r="5" fill="url(#v2-rg)"/>
    <circle cx="62" cy="60" r="8" fill="none" stroke="url(#v2-rg)" stroke-width="1.5" opacity="0.4"/>

    <!-- Small star/sparkle at meeting point -->
    <path d="M 62 52 L 63 57 L 68 58 L 63 59 L 62 64 L 61 59 L 56 58 L 61 57 Z"
          fill="#C8956C" opacity="0.6"/>
  </g>

  <!-- Wordmark -->
  <g transform="translate(152, 0)">
    <text x="0" y="85" font-family="'Georgia', 'Palatino', 'Times New Roman', serif" font-size="60" font-weight="700" fill="#9B2C5E" letter-spacing="-1">
      Hire</text>
    <text x="149" y="85" font-family="'Georgia', 'Palatino', 'Times New Roman', serif" font-size="60" font-weight="700" fill="#C8956C" letter-spacing="-1">
      Found</text>

    <!-- Decorative dot separator between words -->
    <circle cx="143" cy="75" r="3" fill="url(#v2-rg)" opacity="0.5"/>

    <!-- Tagline -->
    <text x="2" y="118" font-family="'Helvetica Neue', 'Arial', sans-serif" font-size="13" fill="#9B2C5E" letter-spacing="3.2" opacity="0.65">
      YOU WANT A HIRE? WE GOT YOU FOUND.</text>
  </g>
</svg>