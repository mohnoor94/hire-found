<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-labelledby="hf3-icon-title">
  <title id="hf3-icon-title">HireFound Icon - HF Monogram</title>
  <defs>
    <linearGradient id="v3i-rg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9B2C5E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C8956C;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect x="4" y="4" width="192" height="192" rx="44" ry="44" fill="url(#v3i-rg)"/>

  <!-- Inner rounded square -->
  <rect x="16" y="16" width="168" height="168" rx="36" ry="36" fill="#FFFAF5"/>

  <!-- Stylized H - rose -->
  <path d="M 48 50 L 48 150" stroke="#9B2C5E" stroke-width="10" stroke-linecap="round"/>
  <path d="M 48 100 L 86 100" stroke="#9B2C5E" stroke-width="8" stroke-linecap="round"/>
  <path d="M 86 64 L 86 150" stroke="#9B2C5E" stroke-width="10" stroke-linecap="round"/>

  <!-- Stylized F - gold -->
  <path d="M 108 50 L 108 150" stroke="#C8956C" stroke-width="10" stroke-linecap="round"/>
  <path d="M 108 50 L 152 50" stroke="#C8956C" stroke-width="8" stroke-linecap="round"/>
  <path d="M 108 88 L 144 88" stroke="#C8956C" stroke-width="8" stroke-linecap="round"/>

  <!-- Connection bridge -->
  <path d="M 86 100 C 93 100, 101 88, 108 88" fill="none" stroke="url(#v3i-rg)" stroke-width="5" stroke-linecap="round" opacity="0.65"/>

  <!-- Diamond accent -->
  <path d="M 97 88 L 101 94 L 97 100 L 93 94 Z" fill="url(#v3i-rg)" opacity="0.45"/>
</svg>