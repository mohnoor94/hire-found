<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 150" role="img" aria-labelledby="hf3-title">
  <title id="hf3-title">HireFound Logo - Concept 3: Interlinked Monogram</title>
  <defs>
    <linearGradient id="v3-rg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9B2C5E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C8956C;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Concept 3: Elegant H+F monogram with interlinking -->
  <g transform="translate(10, 10)">
    <!-- Soft rounded square background -->
    <rect x="2" y="2" width="124" height="124" rx="28" ry="28" fill="url(#v3-rg)" opacity="0.95"/>

    <!-- Inner rounded square -->
    <rect x="10" y="10" width="108" height="108" rx="22" ry="22" fill="#FFFAF5"/>

    <!-- Stylized H - left half, rose -->
    <path d="M 32 32 L 32 96" stroke="#9B2C5E" stroke-width="6" stroke-linecap="round"/>
    <path d="M 32 64 L 58 64" stroke="#9B2C5E" stroke-width="5" stroke-linecap="round"/>
    <path d="M 58 42 L 58 96" stroke="#9B2C5E" stroke-width="6" stroke-linecap="round"/>

    <!-- Stylized F - right half, gold, slightly overlapping -->
    <path d="M 70 32 L 70 96" stroke="#C8956C" stroke-width="6" stroke-linecap="round"/>
    <path d="M 70 32 L 98 32" stroke="#C8956C" stroke-width="5" stroke-linecap="round"/>
    <path d="M 70 58 L 92 58" stroke="#C8956C" stroke-width="5" stroke-linecap="round"/>

    <!-- Connecting bridge between H and F - the "link" -->
    <path d="M 58 64 C 62 64, 66 58, 70 58" fill="none" stroke="url(#v3-rg)" stroke-width="3.5" stroke-linecap="round" opacity="0.7"/>

    <!-- Small diamond accent at connection -->
    <path d="M 64 57 L 66.5 60 L 64 63 L 61.5 60 Z" fill="url(#v3-rg)" opacity="0.5"/>
  </g>

  <!-- Wordmark -->
  <g transform="translate(160, 0)">
    <text x="0" y="82" font-family="'Georgia', 'Palatino', 'Times New Roman', serif" font-size="60" font-weight="700" fill="#9B2C5E" letter-spacing="-1">
      Hire</text>
    <text x="149" y="82" font-family="'Georgia', 'Palatino', 'Times New Roman', serif" font-size="60" font-weight="700" fill="#C8956C" letter-spacing="-1">
      Found</text>

    <!-- Tagline with elegant separator -->
    <line x1="2" y1="100" x2="370" y2="100" stroke="url(#v3-rg)" stroke-width="1" opacity="0.3"/>
    <text x="2" y="120" font-family="'Helvetica Neue', 'Arial', sans-serif" font-size="13" fill="#9B2C5E" letter-spacing="3.2" opacity="0.65">
      YOU WANT A HIRE? WE GOT YOU FOUND.</text>
  </g>
</svg>