<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" role="img" aria-labelledby="hfv-title">
  <title id="hfv-title">HireFound Logo - Vertical Stacked Layout</title>
  <defs>
    <linearGradient id="st-rg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9B2C5E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C8956C;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Centered icon -->
  <g transform="translate(96, 16)">
    <!-- Compass ring -->
    <circle cx="62" cy="62" r="54" fill="none" stroke="url(#st-rg)" stroke-width="5" opacity="0.9"/>
    <circle cx="62" cy="62" r="42" fill="#9B2C5E" opacity="0.06"/>

    <!-- Left figure -->
    <path d="M 34 42 Q 34 28, 48 28 Q 58 28, 58 38" fill="none" stroke="#9B2C5E" stroke-width="4.5" stroke-linecap="round"/>
    <circle cx="48" cy="22" r="6.5" fill="#9B2C5E"/>

    <!-- Right figure -->
    <path d="M 90 42 Q 90 28, 76 28 Q 66 28, 66 38" fill="none" stroke="#C8956C" stroke-width="4.5" stroke-linecap="round"/>
    <circle cx="76" cy="22" r="6.5" fill="#C8956C"/>

    <!-- Convergence -->
    <path d="M 58 38 Q 62 50, 62 58 Q 62 50, 66 38" fill="none" stroke="url(#st-rg)" stroke-width="4" stroke-linecap="round"/>

    <!-- Pin -->
    <path d="M 62 58 L 62 78" stroke="url(#st-rg)" stroke-width="3.5" stroke-linecap="round"/>
    <circle cx="62" cy="82" r="4.5" fill="url(#st-rg)"/>

    <!-- Compass dots -->
    <circle cx="62" cy="5" r="2.5" fill="#C8956C" opacity="0.5"/>
    <circle cx="119" cy="62" r="2.5" fill="#C8956C" opacity="0.5"/>
    <circle cx="62" cy="119" r="2.5" fill="#9B2C5E" opacity="0.5"/>
    <circle cx="5" cy="62" r="2.5" fill="#9B2C5E" opacity="0.5"/>
  </g>

  <!-- Text centered below icon -->
  <!-- "Hire" -->
  <text x="160" y="210" text-anchor="middle" font-family="'Georgia', 'Palatino', 'Times New Roman', serif" font-size="58" font-weight="700" fill="#9B2C5E" letter-spacing="-1">
    <tspan fill="#9B2C5E">Hire</tspan><tspan fill="#C8956C">Found</tspan>
  </text>

  <!-- Elegant divider -->
  <line x1="70" y1="228" x2="250" y2="228" stroke="url(#st-rg)" stroke-width="1.5" opacity="0.35" stroke-linecap="round"/>

  <!-- Tagline -->
  <text x="160" y="254" text-anchor="middle" font-family="'Helvetica Neue', 'Arial', sans-serif" font-size="11" fill="#9B2C5E" letter-spacing="2.5" opacity="0.6">
    YOU WANT A HIRE?</text>
  <text x="160" y="272" text-anchor="middle" font-family="'Helvetica Neue', 'Arial', sans-serif" font-size="11" fill="#C8956C" letter-spacing="2.5" opacity="0.6">
    WE GOT YOU FOUND.</text>

  <!-- Founded by line -->
  <text x="160" y="304" text-anchor="middle" font-family="'Helvetica Neue', 'Arial', sans-serif" font-size="9" fill="#9B2C5E" letter-spacing="2" opacity="0.35">
    EST. BY YASMIN BLASI</text>
</svg>