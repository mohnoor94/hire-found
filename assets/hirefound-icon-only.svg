<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-labelledby="hf-icon-title">
  <title id="hf-icon-title">HireFound Icon</title>
  <defs>
    <linearGradient id="rg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9B2C5E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C8956C;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Outer circle - compass ring -->
  <circle cx="100" cy="100" r="88" fill="none" stroke="url(#rg)" stroke-width="7" opacity="0.9"/>

  <!-- Inner warm glow -->
  <circle cx="100" cy="100" r="68" fill="#9B2C5E" opacity="0.06"/>

  <!-- Left figure - candidate -->
  <path d="M 56 68 Q 56 46, 78 46 Q 94 46, 94 62" fill="none" stroke="#9B2C5E" stroke-width="6.5" stroke-linecap="round"/>
  <circle cx="78" cy="36" r="10" fill="#9B2C5E"/>

  <!-- Right figure - company -->
  <path d="M 144 68 Q 144 46, 122 46 Q 106 46, 106 62" fill="none" stroke="#C8956C" stroke-width="6.5" stroke-linecap="round"/>
  <circle cx="122" cy="36" r="10" fill="#C8956C"/>

  <!-- Convergence point -->
  <path d="M 94 62 Q 100 80, 100 94 Q 100 80, 106 62" fill="none" stroke="url(#rg)" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Pin drop - "Found" -->
  <path d="M 100 94 L 100 126" stroke="url(#rg)" stroke-width="5" stroke-linecap="round"/>
  <circle cx="100" cy="134" r="7" fill="url(#rg)"/>

  <!-- Compass cardinal dots -->
  <circle cx="100" cy="8" r="4" fill="#C8956C" opacity="0.55"/>
  <circle cx="192" cy="100" r="4" fill="#C8956C" opacity="0.55"/>
  <circle cx="100" cy="192" r="4" fill="#9B2C5E" opacity="0.55"/>
  <circle cx="8" cy="100" r="4" fill="#9B2C5E" opacity="0.55"/>

  <!-- Subtle compass arcs -->
  <path d="M 32 48 Q 16 72, 16 100" fill="none" stroke="#9B2C5E" stroke-width="2" opacity="0.2" stroke-linecap="round"/>
  <path d="M 168 48 Q 184 72, 184 100" fill="none" stroke="#C8956C" stroke-width="2" opacity="0.2" stroke-linecap="round"/>
</svg>