<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" role="img" aria-labelledby="hf2-icon-title">
  <title id="hf2-icon-title">HireFound Icon - Location Pin Concept</title>
  <defs>
    <linearGradient id="v2i-rg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9B2C5E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C8956C;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Location pin - larger standalone version -->
  <path d="M 100 12 C 52 12, 14 48, 14 92 C 14 124, 36 156, 100 220 C 164 156, 186 124, 186 92 C 186 48, 148 12, 100 12 Z"
        fill="url(#v2i-rg)" opacity="0.95"/>

  <!-- Inner white cutout -->
  <path d="M 100 28 C 62 28, 32 56, 32 88 C 32 112, 48 140, 100 194 C 152 140, 168 112, 168 88 C 168 56, 138 28, 100 28 Z"
        fill="#FFFAF5"/>

  <!-- Left flowing path -->
  <path d="M 52 76 C 62 60, 78 56, 88 68 C 94 78, 98 86, 100 92"
        fill="none" stroke="#9B2C5E" stroke-width="6" stroke-linecap="round"/>
  <circle cx="52" cy="76" r="9" fill="#9B2C5E"/>

  <!-- Right flowing path -->
  <path d="M 148 76 C 138 60, 122 56, 112 68 C 106 78, 102 86, 100 92"
        fill="none" stroke="#C8956C" stroke-width="6" stroke-linecap="round"/>
  <circle cx="148" cy="76" r="9" fill="#C8956C"/>

  <!-- Meeting point -->
  <circle cx="100" cy="92" r="8" fill="url(#v2i-rg)"/>
  <circle cx="100" cy="92" r="13" fill="none" stroke="url(#v2i-rg)" stroke-width="2" opacity="0.35"/>

  <!-- Sparkle -->
  <path d="M 100 80 L 102 88 L 110 90 L 102 92 L 100 100 L 98 92 L 90 90 L 98 88 Z"
        fill="#C8956C" opacity="0.5"/>
</svg>