<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-labelledby="hfs-title">
  <title id="hfs-title">HireFound Social Media Icon - Circular</title>
  <defs>
    <linearGradient id="sc-rg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9B2C5E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C8956C;stop-opacity:1" />
    </linearGradient>
    <clipPath id="circle-clip">
      <circle cx="100" cy="100" r="98"/>
    </clipPath>
  </defs>

  <!-- Circular background -->
  <circle cx="100" cy="100" r="98" fill="url(#sc-rg)"/>

  <!-- Inner circle -->
  <circle cx="100" cy="100" r="84" fill="#FFFAF5"/>

  <!-- Compass ring -->
  <circle cx="100" cy="100" r="70" fill="none" stroke="url(#sc-rg)" stroke-width="2.5" opacity="0.25"/>

  <!-- Left figure - candidate -->
  <path d="M 60 66 Q 60 50, 76 50 Q 86 50, 88 58" fill="none" stroke="#9B2C5E" stroke-width="5" stroke-linecap="round"/>
  <circle cx="76" cy="42" r="8" fill="#9B2C5E"/>

  <!-- Right figure - company -->
  <path d="M 140 66 Q 140 50, 124 50 Q 114 50, 112 58" fill="none" stroke="#C8956C" stroke-width="5" stroke-linecap="round"/>
  <circle cx="124" cy="42" r="8" fill="#C8956C"/>

  <!-- Convergence -->
  <path d="M 88 58 Q 100 76, 100 86 Q 100 76, 112 58" fill="none" stroke="url(#sc-rg)" stroke-width="4" stroke-linecap="round"/>

  <!-- Pin -->
  <path d="M 100 86 L 100 112" stroke="url(#sc-rg)" stroke-width="4" stroke-linecap="round"/>
  <circle cx="100" cy="118" r="6" fill="url(#sc-rg)"/>

  <!-- Compass dots -->
  <circle cx="100" cy="22" r="3" fill="#C8956C" opacity="0.4"/>
  <circle cx="178" cy="100" r="3" fill="#C8956C" opacity="0.4"/>
  <circle cx="100" cy="178" r="3" fill="#9B2C5E" opacity="0.4"/>
  <circle cx="22" cy="100" r="3" fill="#9B2C5E" opacity="0.4"/>

  <!-- Brand initial at bottom -->
  <text x="100" y="158" font-family="'Georgia', 'Palatino', serif" font-size="16" fill="#9B2C5E" text-anchor="middle" opacity="0.35" letter-spacing="4">
    HF</text>
</svg>