<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 160" role="img" aria-labelledby="hfd-title">
  <title id="hfd-title">HireFound Logo - Dark Background</title>
  <defs>
    <linearGradient id="dk-rg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4698A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D4A87A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="dk-gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#D4A87A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E0BA8C;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Dark background -->
  <rect x="0" y="0" width="540" height="160" rx="12" ry="12" fill="#1A0A12"/>

  <!-- Icon: Compass concept adapted for dark bg -->
  <g transform="translate(18, 16)">
    <circle cx="62" cy="62" r="54" fill="none" stroke="url(#dk-rg)" stroke-width="4.5" opacity="0.85"/>
    <circle cx="62" cy="62" r="42" fill="#D4698A" opacity="0.06"/>

    <!-- Left figure -->
    <path d="M 34 42 Q 34 28, 48 28 Q 58 28, 58 38" fill="none" stroke="#D4698A" stroke-width="4.5" stroke-linecap="round"/>
    <circle cx="48" cy="22" r="6.5" fill="#D4698A"/>

    <!-- Right figure -->
    <path d="M 90 42 Q 90 28, 76 28 Q 66 28, 66 38" fill="none" stroke="#D4A87A" stroke-width="4.5" stroke-linecap="round"/>
    <circle cx="76" cy="22" r="6.5" fill="#D4A87A"/>

    <!-- Convergence -->
    <path d="M 58 38 Q 62 50, 62 58 Q 62 50, 66 38" fill="none" stroke="url(#dk-rg)" stroke-width="4" stroke-linecap="round"/>

    <!-- Pin -->
    <path d="M 62 58 L 62 78" stroke="url(#dk-rg)" stroke-width="3.5" stroke-linecap="round"/>
    <circle cx="62" cy="82" r="4.5" fill="url(#dk-rg)"/>

    <!-- Compass dots -->
    <circle cx="62" cy="5" r="2.5" fill="#D4A87A" opacity="0.5"/>
    <circle cx="119" cy="62" r="2.5" fill="#D4A87A" opacity="0.5"/>
    <circle cx="62" cy="119" r="2.5" fill="#D4698A" opacity="0.5"/>
    <circle cx="5" cy="62" r="2.5" fill="#D4698A" opacity="0.5"/>
  </g>

  <!-- Wordmark on dark -->
  <g transform="translate(160, 5)">
    <text x="0" y="85" font-family="'Georgia', 'Palatino', 'Times New Roman', serif" font-size="60" font-weight="700" fill="#D4698A" letter-spacing="-1">
      Hire</text>
    <text x="149" y="85" font-family="'Georgia', 'Palatino', 'Times New Roman', serif" font-size="60" font-weight="700" fill="#D4A87A" letter-spacing="-1">
      Found</text>

    <text x="2" y="118" font-family="'Helvetica Neue', 'Arial', sans-serif" font-size="13" fill="#D4698A" letter-spacing="3.2" opacity="0.6">
      YOU WANT A HIRE? WE GOT YOU FOUND.</text>
  </g>
</svg>