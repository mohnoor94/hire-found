<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 100" role="img" aria-labelledby="hf-text-title">
  <title id="hf-text-title">HireFound Wordmark</title>
  <defs>
    <linearGradient id="underline-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#9B2C5E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C8956C;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- "Hire" -->
  <text x="10" y="62" font-family="'Georgia', 'Palatino', 'Times New Roman', serif" font-size="60" font-weight="700" fill="#9B2C5E" letter-spacing="-1">
    Hire</text>

  <!-- "Found" -->
  <text x="157" y="62" font-family="'Georgia', 'Palatino', 'Times New Roman', serif" font-size="60" font-weight="700" fill="#C8956C" letter-spacing="-1">
    Found</text>

  <!-- Elegant underline accent -->
  <line x1="12" y1="74" x2="395" y2="74" stroke="url(#underline-grad)" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>

  <!-- Tagline -->
  <text x="14" y="95" font-family="'Helvetica Neue', 'Arial', sans-serif" font-size="12.5" fill="#9B2C5E" letter-spacing="3.8" opacity="0.6">
    YOU WANT A HIRE? WE GOT YOU FOUND.</text>
</svg>