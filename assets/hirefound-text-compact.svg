<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 60" role="img" aria-labelledby="hft-title">
  <title id="hft-title">HireFound Wordmark - Compact</title>
  <defs>
    <linearGradient id="tc-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#9B2C5E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C8956C;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- "Hire" -->
  <text x="8" y="44" font-family="'Georgia', 'Palatino', 'Times New Roman', serif" font-size="50" font-weight="700" fill="#9B2C5E" letter-spacing="-1">
    Hire</text>

  <!-- "Found" -->
  <text x="130" y="44" font-family="'Georgia', 'Palatino', 'Times New Roman', serif" font-size="50" font-weight="700" fill="#C8956C" letter-spacing="-1">
    Found</text>

  <!-- Subtle dot -->
  <circle cx="326" cy="38" r="4" fill="url(#tc-grad)" opacity="0.65"/>
</svg>