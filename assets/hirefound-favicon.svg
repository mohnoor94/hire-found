<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="hf-fav-title">
  <title id="hf-fav-title">HireFound Favicon</title>
  <defs>
    <linearGradient id="fav-rg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9B2C5E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C8956C;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Rounded square base -->
  <rect x="0" y="0" width="64" height="64" rx="14" ry="14" fill="url(#fav-rg)"/>

  <!-- Inner area -->
  <rect x="4" y="4" width="56" height="56" rx="11" ry="11" fill="#FFFAF5"/>

  <!-- Simplified two-person convergence mark -->
  <!-- Left person -->
  <circle cx="22" cy="16" r="4.5" fill="#9B2C5E"/>
  <path d="M 16 26 Q 16 19, 22 19 Q 28 19, 30 24" fill="none" stroke="#9B2C5E" stroke-width="3" stroke-linecap="round"/>

  <!-- Right person -->
  <circle cx="42" cy="16" r="4.5" fill="#C8956C"/>
  <path d="M 48 26 Q 48 19, 42 19 Q 36 19, 34 24" fill="none" stroke="#C8956C" stroke-width="3" stroke-linecap="round"/>

  <!-- Convergence + pin -->
  <path d="M 30 24 Q 32 30, 32 34 Q 32 30, 34 24" fill="none" stroke="url(#fav-rg)" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 32 34 L 32 44" stroke="url(#fav-rg)" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="32" cy="48" r="3.5" fill="url(#fav-rg)"/>
</svg>